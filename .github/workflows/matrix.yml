name: Matrix Workflow
on: push
jobs:
  build:
    continue-on-error: true
    strategy:
        matrix:
           node-version: [14, 15, 16]
           os: [ubuntu-latest,windows-latest]
           include:
                - node-version: 18
                  os: ubuntu-latest
           exclude:
                - node-version: 14
                  os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
       - name: Get Code
         uses: actions/checkout@v7
       - name: Install NodeJs
         uses: actions/setup-node@v6
         with:
           node-version: ${{ matrix.node-version }}
       - name: Install Dependencies
         run: npm ci
       - name: Build Project
         run: npm run build 
